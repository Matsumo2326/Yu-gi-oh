<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[RUSH] PSYCIC — Galeria de Cartas</title>
<link rel="shortcut icon" href="./imagens/ico.ico" type="image/x-icon">
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap');


:root{
  --bg:#0c0817;
  --bg-glow: radial-gradient(circle at 20% -10%, #2a1050 0%, transparent 55%),
             radial-gradient(circle at 90% 10%, #3a0a3f 0%, transparent 45%),
             #0c0817;
  --surface:#160f28;
  --surface-2:#1e1638;
  --line: rgba(200,180,255,0.14);
  --text:#f1ecff;
  --muted:#a99bd1;
  --trevas:#8b5cf6;
  --trevas-dim: rgba(139,92,246,0.14);
  --luz:#f2b93b;
  --luz-dim: rgba(242,185,59,0.14);
  --spell:#38c98f;
  --spell-dim: rgba(56,201,143,0.14);
  --trap:#ef4d94;
  --trap-dim: rgba(239,77,148,0.14);
}

*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  background:var(--bg-glow);
  color:var(--text);
  font-family:'Manrope', sans-serif;
  min-height:100vh;
}

/* ---------- HERO ---------- */
.hero{
  position:relative;
  padding:88px 24px 64px;
  text-align:center;
  overflow:hidden;
  border-bottom:1px solid var(--line);
}
.hero::before{
  content:"";
  position:absolute; inset:0;
  background:
    repeating-linear-gradient(115deg, rgba(139,92,246,0.05) 0px, rgba(139,92,246,0.05) 1px, transparent 1px, transparent 34px);
  pointer-events:none;
}
.eyebrow{
  font-family:'Rajdhani', sans-serif;
  font-weight:600;
  letter-spacing:0.35em;
  font-size:12px;
  color:var(--trevas);
  text-transform:uppercase;
}
h1{
  font-family:'Rajdhani', sans-serif;
  font-weight:700;
  font-size:clamp(38px, 6vw, 68px);
  letter-spacing:0.02em;
  margin:14px 0 10px;
  background:linear-gradient(90deg, #fff 0%, #cbb4ff 45%, var(--luz) 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}
.hero p{
  max-width:560px;
  margin:0 auto;
  color:var(--muted);
  font-size:15.5px;
  line-height:1.6;
}
.hero-stats{
  display:flex; gap:28px; justify-content:center; margin-top:34px; flex-wrap:wrap;
}
.hero-stat{ font-family:'Rajdhani',sans-serif; }
.hero-stat b{ display:block; font-size:26px; color:var(--text); }
.hero-stat span{ font-size:11px; letter-spacing:0.12em; color:var(--muted); text-transform:uppercase; }

/* ---------- FILTERS ---------- */
.filters{
  position:sticky; top:0; z-index:20;
  display:flex; gap:8px; justify-content:center; flex-wrap:wrap;
  padding:16px 20px;
  background:rgba(12,8,23,0.86);
  backdrop-filter: blur(10px);
  border-bottom:1px solid var(--line);
}
.filter-btn{
  font-family:'Rajdhani', sans-serif;
  font-weight:600;
  letter-spacing:0.06em;
  font-size:13px;
  text-transform:uppercase;
  padding:8px 16px;
  border-radius:100px;
  border:1px solid var(--line);
  background:var(--surface);
  color:var(--muted);
  cursor:pointer;
  transition:all .18s ease;
}
.filter-btn:hover{ color:var(--text); border-color:var(--trevas); }
.filter-btn.active{
  background:var(--trevas);
  border-color:var(--trevas);
  color:#0c0817;
}

/* ---------- SECTIONS ---------- */
main{
  max-width:1240px;
  margin:0 auto;
  padding:8px 24px 60px;
}
.section{
  padding-top:44px;
}
.section-head{
  display:flex;
  align-items:baseline;
  gap:14px;
  margin-bottom:24px;
  padding-bottom:14px;
  border-bottom:1px solid var(--line);
}
.section-index{
  font-family:'Rajdhani', sans-serif;
  font-weight:700;
  font-size:13px;
  letter-spacing:0.1em;
  color:var(--bg);
  background:var(--section-accent);
  padding:4px 10px;
  border-radius:6px;
}
.section-title{
  font-family:'Rajdhani', sans-serif;
  font-weight:700;
  font-size:26px;
  letter-spacing:0.01em;
  color:var(--text);
}
.section-count{
  font-size:12.5px;
  color:var(--muted);
  margin-left:auto;
  font-family:'Rajdhani', sans-serif;
  letter-spacing:0.05em;
}

/* ---------- GRID ---------- */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(270px, 1fr));
  gap:26px;
}

.card{
  position:relative;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:14px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  transition:transform .22s ease, border-color .22s ease, box-shadow .22s ease;
}
.card[data-cat="monster"]{ --accent:var(--trevas); }
.card[data-attr="LUZ"]{ --accent:var(--luz); }
.card[data-cat="spell"]{ --accent:var(--spell); }
.card[data-cat="trap"]{ --accent:var(--trap); }

.card:hover{
  transform:translateY(-6px);
  border-color:var(--accent);
  box-shadow:0 20px 40px -18px var(--accent);
}

/* holo sweep signature */
.card::after{
  content:"";
  position:absolute; inset:0;
  background:conic-gradient(from 0deg at 50% 50%, transparent 0deg, rgba(255,255,255,0.16) 18deg, transparent 40deg, transparent 360deg);
  opacity:0;
  transition:opacity .3s ease;
  pointer-events:none;
  animation:spin 3.4s linear infinite paused;
}
.card:hover::after{ opacity:1; animation-play-state:running; }
@keyframes spin{ to{ transform:rotate(360deg); } }

.card-top{
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 12px;
  border-bottom:1px solid var(--line);
  background:var(--surface-2);
}
.card-name{
  font-family:'Rajdhani', sans-serif;
  font-weight:700;
  font-size:15px;
  letter-spacing:0.01em;
}
.card-badge{
  font-size:10px;
  font-weight:700;
  letter-spacing:0.08em;
  padding:3px 8px;
  border-radius:6px;
  color:#0c0817;
  background:var(--accent);
  white-space:nowrap;
}

/* image slot */
.art-slot{
  position:relative;
  aspect-ratio: 3 / 4.3;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.03) 25%, transparent 25%) -8px 0/16px 16px,
    linear-gradient(225deg, rgba(255,255,255,0.03) 25%, transparent 25%) -8px 0/16px 16px,
    var(--surface-2);
  border-bottom:1px solid var(--line);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  padding:8px;
}
.art-slot img{ width:100%; height:100%; object-fit:contain; display:block; border-radius:6px; }
.art-placeholder{
  text-align:center;
  color:var(--muted);
  font-family:'Rajdhani', sans-serif;
  font-size:12.5px;
  letter-spacing:0.04em;
  padding:0 14px;
}
.art-placeholder .icon{
  font-size:22px;
  display:block;
  margin-bottom:6px;
  color:var(--accent);
}
.art-placeholder code{
  display:block;
  margin-top:6px;
  font-size:10.5px;
  color:var(--accent);
  word-break:break-all;
}

.card-meta{
  display:flex; gap:10px; align-items:center;
  padding:10px 12px;
  font-family:'Rajdhani', sans-serif;
  font-size:12.5px;
  color:var(--muted);
  border-bottom:1px solid var(--line);
  flex-wrap:wrap;
}
.stars{ color:var(--luz); letter-spacing:1px; }
.stat{
  font-weight:700; color:var(--text);
}

.card-text{
  padding:12px 14px 16px;
  font-size:12.8px;
  line-height:1.55;
  color:#d9cfff;
  flex:1;
}
.card-text .flavor{ color:var(--muted); font-style:italic; }
.card-text .req{ color:var(--luz); font-weight:700; }
.card-text .eff{ color:var(--spell); font-weight:700; }

footer{
  text-align:center;
  padding:30px;
  color:var(--muted);
  font-size:12px;
  border-top:1px solid var(--line);
}
</style>
</head>
<body>

<section class="hero">
  <div class="eyebrow">2026.05 TCG — [RUSH] PSYCIC</div>
  <h1>The Psychic Loud Rock</h1>
  <p>Galeria traduzida do deck PSYCHIC de Rush Duel. Destinado ao Duel Rush Carnival: Yugioh Sevens dos Fellas</p>
  <div class="hero-stats">
    <div class="hero-stat"><b>27</b><span>Monstros</span></div>
    <div class="hero-stat"><b>9</b><span>Magias</span></div>
    <div class="hero-stat"><b>4</b><span>Armadilhas</span></div>
    <div class="hero-stat"><b>14</b><span>Nesta galeria</span></div>
  </div>
</section>

<div class="filters">
  <button class="filter-btn active" data-filter="all">Todos os atributos</button>
  <button class="filter-btn" data-filter="TREVAS">Trevas</button>
  <button class="filter-btn" data-filter="LUZ">Luz</button>
</div>

<main id="sections"></main>

<footer>Deck [RUSH] PSYCHIC · Traduzido para PT-BR · Feito por fã · Não oficial</footer>

<script>
// As imagens já estão preenchidas via a propriedade img: "imagens/nome-da-carta.jpg"
// (arquivos na pasta imagens/, ao lado deste HTML). Para trocar uma imagem, edite o
// caminho ou substitua o arquivo correspondente na pasta.
const cards = [
  {
    name:"Psy Stage Bouncer", cat:"monster", attr:"TREVAS", monsterType:"Normal", img:"./imagens/psy-stage-bouncer.jpg",
    level:6, atk:2000, def:700,
    text:`<span class="flavor">A ameaça psíquica vem crescendo nos últimos anos, e uma equipe de guarda-costas de elite foi encarregada de proteger Psychic Diva, a chave para resolver tudo.</span>`
  },
  {
    name:"Silent Assailant", cat:"monster", attr:"TREVAS", monsterType:"Normal", img:"./imagens/silent-assailant.jpg",
    level:4, atk:1500, def:0,
    text:`<span class="flavor">Uma assassina esquiva que assume missões perigosas enquanto procura por seu parceiro perdido.</span>`
  },
  {
    name:"Peace Holder", cat:"monster", attr:"LUZ", monsterType:"Normal", img:"./imagens/peace-holder.jpg",
    level:4, atk:1500, def:0,
    text:`<span class="flavor">Uma policial que mantém a paz na área local. Ela está lutando para resolver certos casos de pessoas desaparecidas.</span>`
  },
  {
    name:"Howlingbird", cat:"monster", attr:"LUZ", monsterType:"Normal", img:"./imagens/howlingbird.jpg",
    level:1, atk:0, def:1400,
    text:`<span class="flavor">Um pássaro que emite som constantemente enquanto voa com o vento. Diz-se que o barulho de suas asas reflete o coração de quem o ouve. Para alguns soa como uma bela canção, mas para outros é um zumbido sinistro.</span>`
  },
  {
    name:"Giftarist", cat:"monster", attr:"TREVAS", monsterType:"Efeito", img:"./imagens/giftarist.jpg",
    level:7, atk:2400, def:0,
    text:`<span class="req">[REQUISITO]</span> Envie a carta do topo do seu Deck para o Cemitério.<br><span class="eff">[EFEITO]</span> Este card ganha ATK igual a [o número de outros monstros Tipo Psíquico virados para cima em seu campo] x400 até o final deste turno.`
  },
  {
    name:"Prima Guitarna the Shining Superstar", cat:"monster", attr:"LUZ", monsterType:"Efeito", img:"./imagens/prima-guitarna.jpg",
    level:7, atk:2200, def:0,
    text:`<span class="req">[REQUISITO]</span> Pague 1000 PV.<br><span class="eff">[EFEITO]</span> Todos os monstros virados para cima em seu campo ganham ATK igual a [o número de monstros no campo do seu oponente] x300 até o final deste turno.`
  },
  {
    name:"Romic n' Roller", cat:"monster", attr:"TREVAS", monsterType:"Efeito", img:"./imagens/romic-n-roller.jpg",
    level:6, atk:1700, def:0,
    text:`<span class="req">[REQUISITO]</span> Seus PV são 2000 ou menos.<br><span class="eff">[EFEITO]</span> Todos os monstros virados para cima no campo do seu oponente perdem 500 de ATK e DEF até o final deste turno.`
  },
  {
    name:"Dream Drummer", cat:"monster", attr:"TREVAS", monsterType:"Efeito", img:"./imagens/dream-drummer.jpg",
    level:2, atk:500, def:0,
    text:`<span class="req">[REQUISITO]</span> Embaralhe 1 monstro Tipo Psíquico do seu Cemitério de volta ao Deck.<br><span class="eff">[EFEITO]</span> Embaralhe 1 monstro do Cemitério do seu oponente de volta ao Deck. Depois, se você tiver um Monstro Normal virado para cima em seu campo, você pode ganhar 500 PV.`
  },
  {
    name:"Romanpick", cat:"monster", attr:"LUZ", monsterType:"Efeito", img:"./imagens/romanpick.jpg",
    level:1, atk:500, def:0,
    text:`<span class="req">[REQUISITO]</span> Se seus PV forem menores que os do seu oponente, pague 500 PV.<br><span class="eff">[EFEITO]</span> Envie as 3 cartas do topo do seu Deck para o Cemitério. Se um(ns) monstro(s) Tipo Psíquico estiver entre as cartas enviadas, adicione 1 monstro Tipo Psíquico do Cemitério à sua mão.`
  },
  {
    name:"Powerful Pierce!!", cat:"spell", img:"./imagens/powerful-pierce.jpg",
    text:`<span class="req">[REQUISITO]</span> Envie 1 carta da sua mão para o Cemitério.<br><span class="eff">[EFEITO]</span> Escolha 2 monstros virados para cima em seu campo com o mesmo Nível entre si. Se esses monstros atacarem um monstro em Posição de Defesa neste turno, cause dano de batalha perfurante (se o ATK do monstro atacante exceder o DEF do alvo do ataque, cause a diferença).`
  },
  {
    name:"Psychic Divergence", cat:"spell", img:"./imagens/psychic-divergence.jpg",
    text:`<span class="req">[REQUISITO]</span> Se você tiver um monstro Tipo Psíquico virado para cima em seu campo, pague 500 PV.<br><span class="eff">[EFEITO]</span> Coloque 1 Carta de Magia/Armadilha do campo do seu oponente no topo do Deck do dono.`
  },
  {
    name:"Climax Finale", cat:"spell", img:"./imagens/climax-finale.jpg",
    text:`<span class="req">[REQUISITO]</span> Pague PV iguais a [o número de monstros Tipo Psíquico no seu Cemitério] x100.<br><span class="eff">[EFEITO]</span> 1 monstro Tipo Psíquico virado para cima em seu campo ganha ATK igual a [o número de monstros Tipo Psíquico no seu Cemitério] x100 até o final deste turno.`
  },
  {
    name:"Psychic Introduction", cat:"trap", img:"./imagens/psychic-introduction.jpg",
    text:`<span class="req">[REQUISITO]</span> Quando seu oponente Invocar por Invocação-Normal um monstro.<br><span class="eff">[EFEITO]</span> Ganhe PV iguais a [o número de monstros Tipo Psíquico virados para cima em seu campo] x500.`
  },
  {
    name:"Psychic Trap Hole", cat:"trap", archetype:"Trap Hole", img:"./imagens/psychic-trap-hole.jpg",
    text:`<span class="req">[REQUISITO]</span> Quando seu oponente Invocar por Invocação-Normal um monstro de Nível 5 ou superior, e você tiver 2 ou mais monstros Tipo Psíquico virados para cima em seu campo.<br><span class="eff">[EFEITO]</span> Destrua esse monstro Invocado por Invocação-Normal.`
  },
    {
    name:"Sakuretsu Armor", cat:"trap", archetype:"Sakuretsu Armor", img:"./imagens/sakuretsu-armor.jpg",
    text:`<span class="req">[REQUISITO]</span>Quando o monstro de um oponente declarar um ataque.<br><span class="eff">[EFEITO]</span>Destrua o monstro atacante.`
  },
];

const catLabel = { monster:"Monstro", spell:"Magia", trap:"Armadilha" };

function starIcons(n){ return "★".repeat(n); }

function cardHTML(c, idx){
  const badgeText = c.cat === "monster"
    ? `${c.attr} · ${catLabel[c.cat]}`
    : (c.archetype ? `${catLabel[c.cat]} · ${c.archetype}` : catLabel[c.cat]);

  const meta = c.cat === "monster"
    ? `<span class="stars">${starIcons(c.level)}</span><span>Nv.${c.level}</span><span class="stat">ATK ${c.atk}</span><span class="stat">DEF ${c.def}</span>`
    : `<span>Carta de ${catLabel[c.cat]}</span>`;

  const art = c.img
    ? `<img src="${c.img}" alt="${c.name}">`
    : `<div class="art-placeholder">
        <span class="icon">&#9733;</span>
        Espaço da imagem<code>img: "imagens/${idx+1}.png"</code>
      </div>`;

  return `
  <article class="card" data-cat="${c.cat}" data-attr="${c.attr || ''}">
    <div class="card-top">
      <div class="card-name">${c.name}</div>
      <div class="card-badge">${badgeText}</div>
    </div>
    <div class="art-slot" id="slot-${idx}">${art}</div>
    <div class="card-meta">${meta}</div>
    <div class="card-text">${c.text}</div>
  </article>`;
}

const grid = document.getElementById('sections');

const sectionOrder = [
  { key:"monster", title:"Monstros", roman:"I", accent:"var(--trevas)" },
  { key:"trap",    title:"Armadilhas", roman:"II", accent:"var(--trap)" },
  { key:"spell",   title:"Magias", roman:"III", accent:"var(--spell)" },
];

grid.innerHTML = sectionOrder.map(sec => {
  const items = cards
    .map((c, i) => ({...c, idx:i}))
    .filter(c => c.cat === sec.key);
  if(items.length === 0) return "";
  return `
  <section class="section" style="--section-accent:${sec.accent}">
    <div class="section-head">
      <span class="section-index">${sec.roman}</span>
      <span class="section-title">${sec.title}</span>
      <span class="section-count">${items.length} carta${items.length > 1 ? 's' : ''}</span>
    </div>
    <div class="grid">
      ${items.map(c => cardHTML(c, c.idx)).join("")}
    </div>
  </section>`;
}).join("");

// filters (por atributo — Trevas/Luz; Magias e Armadilhas não têm atributo e ficam sempre visíveis)
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const f = btn.dataset.filter;
    document.querySelectorAll('.card').forEach(card=>{
      const show = f === 'all' || card.dataset.attr === '' || card.dataset.attr === f;
      card.style.display = show ? '' : 'none';
    });
  });
});
</script>

</body>
</html>
